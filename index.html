<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawser Ahmed Joy | 7 No Ward</title>
    <style>
        body { margin: 0; font-family: 'Times New Roman', serif; background-color: #001a00; color: white; overflow-x: hidden; }

        /* সিলেটের ঐতিহ্যবাহী চা বাগান থিম */
        .home-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            /* সিলেটের চা বাগানের একটি ব্লারড ইমেজ ব্যাকগ্রাউন্ড */
            background: linear-gradient(rgba(0, 20, 0, 0.8), rgba(0, 10, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1596408434743-3051086395e9?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 20px;
        }

        .home-section img {
            border-radius: 50%;
            border: 4px solid #d4af37; /* সোনালী বর্ডার */
            width: 180px;
            height: 180px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 2;
        }

        .home-section h1 {
            font-size: 40px;
            margin: 10px 0;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
        }

        .home-section p { font-size: 20px; z-index: 2; opacity: 0.9; }

        /* বাটন ডিজাইন */
        .btn-container { margin-top: 30px; z-index: 2; }
        .btn {
            background: #d4af37;
            color: #001a00;
            padding: 14px 30px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin: 10px;
            transition: 0.3s;
            border-radius: 5px;
            text-transform: uppercase;
        }
        .btn:hover { background: #fff; transform: translateY(-3px); }

        /* নেভিগেশন */
        nav { background: #000; padding: 15px 0; text-align: center; border-bottom: 2px solid #d4af37; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        nav a:hover { color: #d4af37; }

        footer { background: #000; color: #555; text-align: center; padding: 25px; font-size: 14px; }
    </style>
</head>
<body>

<div class="home-section" id="home">
    <img src="20260221_214415.jpg" alt="Kawser Ahmed Joy">
    
    <h1>Kawser Ahmed Joy</h1>
    <p>৭ নং ওয়ার্ড কাউন্সিলর পদপ্রার্থী</p>
    <p style="font-style: italic; font-size: 18px;">“৩৬০ আউলিয়ার পুণ্যভূমি সিলেটের সেবায় নিবেদিত”</p>
    
    <div class="btn-container">
        <a href="about.html" class="btn">আমার পরিচিতি</a>
        <a href="promises.html" class="btn">আমার প্রতিশ্রুতি</a>
    </div>
</div>

<nav>
    <a href="#home">Home</a>
    <a href="about.html">About</a>
    <a href="promises.html">Promises</a>
</nav>

<footer>
    © 2026 Kawser Ahmed Joy | সিলেটের ঐতিহ্য ও উন্নয়নের অগ্রপথিক
</footer>

</body>
</html>
