<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawser Ahmed Joy | 7 No Ward</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #000; color: white; }

        .home-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* আপনার আপলোড করা বড় নামের ফাইলটি এখানে সেট করা হয়েছে */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('1771769492142~2.png'); 
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 20px;
        }

        .home-section img {
            border-radius: 50%;
            border: 4px solid #d4af37;
            width: 170px;
            height: 170px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .home-section h1 { 
            font-size: 35px; 
            margin: 10px 0; 
            color: #d4af37; 
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        .home-section p {
            font-size: 20px;
            margin: 5px 0;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        
        .btn-container { margin-top: 25px; }
        .btn {
            background: #d4af37;
            color: #000;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin: 10px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: #fff; transform: translateY(-3px); }

        nav { background: #000; padding: 15px 0; text-align: center; border-top: 1px solid #d4af37; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-size: 14px; font-weight: bold; }
        nav a:hover { color: #d4af37; }
    </style>
</head>
<body>

<div class="home-section">
    <img src="20260221_214415.jpg" alt="Kawser Ahmed Joy">
    
    <h1>Kawser Ahmed Joy</h1>
    <p>৭ নং ওয়ার্ড কাউন্সিলর পদপ্রার্থী</p>
    <p style="font-style: italic; font-size: 16px; opacity: 0.9;">“সিলেটের ঐতিহ্য ও উন্নয়নে প্রতিশ্রুতিবদ্ধ”</p>
    
    <div class="btn-container">

</div>
