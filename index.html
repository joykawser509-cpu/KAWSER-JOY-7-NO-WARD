        /* প্রফেশনাল ক্লাসিক হেডার */
        .home-section {
            height: 100vh;
            display: flex;
            flex-direction: column;

            align-items: center;
            /* ক্লাসিক নেভি ব্লু গ্রেডিয়েন্ট */

        }

        .home-section img {
            border-radius: 50%;

            height: 180px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .home-section h1 {
            font-size: 42px;
            margin: 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #d4af37; /* গোল্ডেন কালার */
        }

        .home-section p {
            font-size: 20px;
            font-style: italic;
            opacity: 0.9;
        }

        /* ক্লাসিক ডার্ক মেনু */
        nav {
            background: #111;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #d4af37;
        }

        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #d4af37;
        }

        /* কার্ড ডিজাইন */
        section {
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            border-radius: 5px; /* ক্লাসিক লুকের জন্য কম রাউন্ড */
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #ddd;
        }

        /* গোল্ডেন ক্লাসিক বাটন */
        .btn {
            background: #d4af37;
            color: #1a2a6c;
            padding: 15px 40px;
            border-radius: 2px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 25px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #b8962e;
            color: white;
            transform: translateY(-3px);
        }

        .contact-info {
            margin-top: 20px;
            font-size: 18px;
        }

        footer {
