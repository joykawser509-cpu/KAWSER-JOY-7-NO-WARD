    <style>

        html {
            scroll-behavior: smooth;
        }
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* হেডার ডিজাইন */
        header {
            text-align: center; 
            padding: 40px 20px;

        }

        header img {
            border-radius: 50%; 
            margin-bottom: 15px;

        header h1 {

            font-size: 36px;
        }

        header p {

        }

        nav {

            padding: 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #4caf50;
        }

        section {
            padding: 40px 20px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .btn {
            background: #006a4e;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }

        .btn:hover {
            background: #004d38;
        }

        .contact-link {
            text-decoration: none;
            color: #1877F2;
            font-weight: bold;
        }
    </style>
