    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
        }

        /* উইনিক সিটি/পিপল ব্যাকগ্রাউন্ড হেডার */
        .home-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: url('https://images.unsplash.com/photo-1570126618983-dd752348ebf4?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* ব্যাকগ্রাউন্ডের ওপর কালো আবছায়া (Overlay) */
        .home-section::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65); /* এটি ছবিকে অন্ধকার করে লেখা ফুটিয়ে তুলবে */
            z-index: 1;
        }

        .content-box {
            position: relative;
            z-index: 2; /* লেখাকে ছবির ওপরে রাখবে */
        }

        .home-section img {
            border-radius: 50%;
            border: 5px solid #d4af37;
            width: 180px;
            height: 180px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .home-section h1 {
            font-size: 38px;
            margin: 10px 0;
            color: #d4af37;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .home-section p {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* নেভিগেশন মেনু */
        nav {
            background: #111;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #d4af37;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
        }

        nav a:hover { color: #d4af37; }

        /* বাটন ডিজাইন */
        .btn-container { margin-top: 30px; }
        .btn {
            background: #d4af37;
            color: #111;
            padding: 14px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #fff;
            transform: translateY(-3px);
        }

        /* কন্টাক্ট সেকশন */
        section { padding: 60px 20px; text-align: center; }
        .card {
            background: white;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        footer { background: #111; color: #777; text-align: center; padding: 25px; }
    </style>
