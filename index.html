<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawser Ahmed Joy | 7 No Ward</title>
    <style>
        body { margin: 0; font-family: 'Times New Roman', serif; background-color: #f8fdf8; color: #1a2a3a; }

        /* সিলেটের ঐতিহ্যবাহী থিম */
        .home-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            /* সিলেটের চা বাগানের একটি স্নিগ্ধ ব্যাকগ্রাউন্ড */
            background: linear-gradient(rgba(0, 40, 0, 0.7), rgba(0, 20, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1596408434743-3051086395e9?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .home-section img {
            border-radius: 50%;
            border: 5px solid #d4af37;
            width: 190px;
            height: 190px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .home-section h1 { font-size: 40px; margin: 10px 0; color: #d4af37; text-transform: uppercase; }
        .home-section p { font-size: 20px; font-weight: 300; }

        /* সিলেটের ঐতিহ্যের একটি ছোট ট্যাগ */
        .sylhet-tag {
            background: rgba(212, 175, 55, 0.2);
            padding: 5px 15px;
            border: 1px solid #d4af37;
            font-size: 14px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        nav { background: #002200; padding: 15px 0; text-align: center; border-bottom: 2px solid #d4af37; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 15px; }
        nav a:hover { color: #d4af37; }

        .btn-container { margin-top: 30px; }
        .btn {
            background: #d4af37;
            color: #002200;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin: 10px;
            transition: 0.3s;
            border-radius: 2px;
        }
        .btn:hover { background: #fff; transform: translateY(-3px); }

        /* সিলেটের আইকন সেকশন */
        .tradition-info { padding: 40px 20px; text-align: center; background: #fff; }
        .tradition-info span { font-size: 24px; color: #004d00; display: block; margin-bottom: 10px; }
